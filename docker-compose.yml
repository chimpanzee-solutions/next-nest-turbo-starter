services:
  postgres:
    image: postgres:18.3
    container_name: starter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: starter_db
    ports:
      - "7778:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
